<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세콤 카드분출 관리대장 (보안/통합 뷰)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
    /* 스크롤바 커스텀 디자인 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 w-full h-full min-h-screen overflow-hidden">

  <div id="loginModal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-50 transition-opacity">
    <div class="bg-white w-11/12 max-w-sm rounded-2xl p-8 shadow-2xl">
      <div class="text-center mb-6">
        <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🔐</div>
        <h2 class="text-xl font-bold text-slate-900">관리자 인증</h2>
        <p class="text-sm text-slate-500 mt-1">카드 분출 및 반납 처리를 위해 로그인하세요.</p>
      </div>
      <form onsubmit="processLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">아이디</label>
          <input type="text" id="loginId" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
          <input type="password" id="loginPw" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="flex space-x-3 pt-4">
          <button type="button" onclick="toggleLoginModal(false)" class="flex-1 bg-slate-100 text-slate-700 font-medium py-3 rounded-xl hover:bg-slate-200 transition">취소</button>
          <button type="submit" class="flex-1 bg-indigo-600 text-white font-medium py-3 rounded-xl hover:bg-indigo-700 transition shadow-md">로그인</button>
        </div>
      </form>
    </div>
  </div>

  <div id="pc-view" class="hidden flex-col h-screen w-full">
    
    <header class="bg-indigo-900 text-white shadow-md px-8 py-4 flex justify-between items-center shrink-0 z-20">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-500 p-2 rounded-lg text-white font-bold text-xl">💳</div>
        <h1 class="text-xl font-bold tracking-wide">세콤 카드분출 관리대장 <span class="text-xs text-indigo-300 ml-2">보안 PC 뷰</span></h1>
      </div>
      <div class="flex items-center space-x-4">
        <div id="pc-status-badge" class="text-sm bg-indigo-800 px-4 py-1.5 rounded-full text-indigo-200">
          통신 대기중...
        </div>
        
        <div id="pc-auth-container">
          <button onclick="toggleLoginModal(true)" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded-lg text-sm font-medium text-white transition-colors shadow-sm">
            🔐 관리자 로그인
          </button>
        </div>

        <button onclick="switchViewMode('mobile')" class="bg-indigo-700 hover:bg-indigo-600 px-3 py-1.5 rounded-lg text-sm text-white transition-colors flex items-center shadow-sm">
          📱 스마트폰 뷰로 전환
        </button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <aside id="pc-form-aside" class="hidden w-96 bg-white border-r border-slate-200 p-6 shadow-sm overflow-y-auto shrink-0 z-10">
        <div class="border-b border-slate-100 pb-4 mb-6 flex justify-between items-center">
          <div>
            <h2 class="text-lg font-bold text-slate-900">신규 분출 등록</h2>
            <p class="text-xs text-slate-500 mt-1">대여자의 인적사항을 입력하세요.</p>
          </div>
          <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded">관리자 모드</span>
        </div>

        <form id="pcForm" onsubmit="submitData(event, 'pc')" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">이름</label>
            <input type="text" id="pc-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">소속</label>
            <input type="text" id="pc-department" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">전화번호</label>
            <input type="tel" id="pc-phone" placeholder="010-0000-0000" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">카드번호 선택</label>
            <select id="pc-cardNumber" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white cursor-pointer">
              <option value="" disabled selected>카드를 선택해주세요</option>
              <option value="예비1">예비1</option>
              <option value="예비2">예비2</option>
              <option value="예비3">예비3</option>
              <option value="예비4">예비4</option>
              <option value="예비5">예비5</option>
            </select>
          </div>
          <button type="submit" id="pc-submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm shadow-sm mt-2 transition-colors">
            분출 데이터 등록
          </button>
        </form>
      </aside>

      <main class="flex-1 p-8 overflow-y-auto flex flex-col bg-slate-50 relative">
        <div id="pc-readonly-notice" class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-lg shadow-sm">
          <div class="flex items-center">
            <span class="text-blue-500 text-xl mr-3">ℹ️</span>
            <p class="text-sm text-blue-800 font-medium">현재 <b>조회 전용 모드</b>입니다. 신규 분출 등록이나 반납 처리를 원하시면 우측 상단의 <span class="font-bold">관리자 로그인</span> 버튼을 클릭해주세요.</p>
          </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row items-center justify-between shrink-0">
          <div class="relative w-full md:w-96 mb-3 md:mb-0">
            <input type="text" id="pc-search" oninput="filterData()" placeholder="이름, 소속, 카드번호 검색..." class="w-full pl-3 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="flex space-x-2">
            <select id="pc-statusFilter" onchange="filterData()" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="전체">전체 상태</option>
              <option value="대기">대기</option>
              <option value="분출완료">분출완료</option>
              <option value="반납완료">반납완료</option>
            </select>
            <button onclick="fetchData()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center">
              🔄 새로고침
            </button>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex-1">
          <div class="overflow-x-auto h-full">
            <table class="w-full text-left border-collapse relative">
              <thead class="sticky top-0 bg-slate-50 z-10">
                <tr class="border-b border-slate-200 text-slate-600 text-xs font-semibold uppercase tracking-wider">
                  <th class="px-6 py-4">이름</th>
                  <th class="px-6 py-4">소속</th>
                  <th class="px-6 py-4">전화번호</th>
                  <th class="px-6 py-4">카드번호</th>
                  <th class="px-6 py-4">분출일</th>
                  <th class="px-6 py-4">반납일</th>
                  <th class="px-6 py-4 text-center">확인 (상태)</th>
                  <th class="px-6 py-4 text-center">작업</th>
                </tr>
              </thead>
              <tbody id="pc-tableBody" class="divide-y divide-slate-100 text-sm">
                </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>


  <div id="mobile-view" class="hidden flex-col min-h-screen bg-slate-100 w-full overflow-x-hidden relative">
    
    <header class="bg-indigo-900 text-white shadow-sm px-4 py-3 sticky top-0 z-20 flex justify-between items-center shrink-0">
      <div class="flex items-center space-x-2">
        <span class="text-lg">💳</span>
        <h1 class="text-base font-bold tracking-tight">세콤 관리 <span class="text-xs text-indigo-300 font-normal">Mobile</span></h1>
      </div>
      <div class="flex space-x-2">
        <div id="m-auth-container" class="flex items-center">
          <button onclick="toggleLoginModal(true)" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-2.5 py-1.5 rounded-md text-white font-medium shadow-sm">
            🔐 로그인
          </button>
        </div>
        <button onclick="switchViewMode('pc')" class="text-xs bg-indigo-700 px-2.5 py-1.5 rounded-md text-white active:bg-indigo-600 shadow-sm">
          💻 PC 뷰
        </button>
      </div>
    </header>

    <div class="p-3 bg-white border-b border-slate-200 shadow-sm space-y-2 sticky top-[52px] z-10 shrink-0">
      <div id="m-readonly-notice" class="bg-blue-50 border border-blue-200 p-2 rounded-lg mb-2 flex items-center justify-center space-x-2">
        <span class="text-blue-500">ℹ️</span>
        <span class="text-xs text-blue-800 font-medium">현재 조회 전용입니다. 로그인시 등록 가능.</span>
      </div>
      <input type="text" id="m-search" oninput="filterData()" placeholder="이름, 소속, 카드번호 검색..." class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <div class="flex space-x-2">
        <button onclick="setMobileFilter('전체', this)" class="m-filter-btn flex-1 py-1 text-xs font-medium rounded-md bg-indigo-600 text-white border border-indigo-600">전체</button>
        <button onclick="setMobileFilter('분출완료', this)" class="m-filter-btn flex-1 py-1 text-xs font-medium rounded-md bg-white text-slate-600 border border-slate-200">분출완료</button>
        <button onclick="setMobileFilter('반납완료', this)" class="m-filter-btn flex-1 py-1 text-xs font-medium rounded-md bg-white text-slate-600 border border-slate-200">반납완료</button>
      </div>
    </div>

    <main class="flex-1 p-3 space-y-3 overflow-y-auto" id="m-cardContainer">
      </main>

    <button id="mobile-fab" onclick="toggleMobileModal(true)" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white w-14 h-14 rounded-full shadow-xl items-center justify-center font-bold text-2xl z-20 active:scale-95 transition-transform border-2 border-white">
      ＋
    </button>

    <div id="m-registerModal" class="fixed inset-0 bg-slate-900/60 hidden items-end justify-center z-30 transition-opacity">
      <div class="bg-white w-full rounded-t-2xl max-h-[85vh] overflow-y-auto p-6 space-y-4 shadow-xl">
        <div class="flex justify-between items-center border-b border-slate-100 pb-2">
          <div class="flex items-center space-x-2">
            <h3 class="text-base font-bold text-slate-900">신규 분출 신청</h3>
            <span class="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-0.5 rounded">관리자</span>
          </div>
          <button onclick="toggleMobileModal(false)" class="text-slate-400 p-1 text-xl font-semibold hover:text-slate-700">&times;</button>
        </div>

        <form id="mobileForm" onsubmit="submitData(event, 'mobile')" class="space-y-3 text-sm">
          <div>
            <label class="block font-medium text-slate-700 mb-1">이름</label>
            <input type="text" id="m-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg">
          </div>
          <div>
            <label class="block font-medium text-slate-700 mb-1">소속</label>
            <input type="text" id="m-department" required class="w-full px-3 py-2 border border-slate-300 rounded-lg">
          </div>
          <div>
            <label class="block font-medium text-slate-700 mb-1">전화번호</label>
            <input type="tel" id="m-phone" placeholder="010-0000-0000" required class="w-full px-3 py-2 border border-slate-300 rounded-lg">
          </div>
          <div>
            <label class="block font-medium text-slate-700 mb-1">카드번호 선택</label>
            <select id="m-cardNumber" required class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white appearance-none">
              <option value="" disabled selected>카드를 선택해주세요</option>
              <option value="예비1">예비1</option>
              <option value="예비2">예비2</option>
              <option value="예비3">예비3</option>
              <option value="예비4">예비4</option>
              <option value="예비5">예비5</option>
            </select>
          </div>
          <div class="flex space-x-2 pt-2">
            <button type="button" onclick="toggleMobileModal(false)" class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-lg font-medium">취소</button>
            <button type="submit" id="m-submitBtn" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg font-medium">분출 등록</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // [가장 중요!] 구글 앱스 스크립트 웹앱 주소를 아래 따옴표 안에 넣으세요.
    // 주의: 구글 스크립트 배포 시 "액세스 권한이 있는 사용자"를 반드시 "모든 사용자(Anyone)"로 하셔야 CORS 에러가 발생하지 않습니다!
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzznhDOIy8Mcm-ktfOac3z_XgWsSYbp3k5ImE2hHYhQCjsI69Rx-gaTQCiRqYqnMLRI/exec'; 

    // [보안 설정] 이곳에 원하시는 관리자 아이디와 비밀번호를 설정하세요.
    const ADMIN_ID = 'admin';
    const ADMIN_PW = 'SBSqnsekd11!';

    // 전역 상태 관리 변수 (장부 데이터 및 로그인 상태)
    let globalRecords = [];
    let currentMobileFilter = '전체';
    let isAdminLoggedIn = false; // 유리 진열장의 자물쇠 상태입니다 (초기값: 잠김)

    /**
     * 화면이 처음 켜질 때 호출되는 초기화 함수입니다.
     */
    window.addEventListener('DOMContentLoaded', () => {
      const isMobile = window.innerWidth < 768;
      switchViewMode(isMobile ? 'mobile' : 'pc');
      updateAdminUI(); // 로그인 상태에 따라 화면 구조를 바꿉니다.
      fetchData(); // 구글 서버에서 데이터를 가져옵니다.
    });

    /**
     * [보안 로직] 사용자가 입력한 아이디와 비밀번호를 검증하여 유리 진열장(관리자 기능)을 엽니다.
     */
    function processLogin(event) {
      event.preventDefault(); // 페이지 새로고침 방지
      const idInput = document.getElementById('loginId').value.trim();
      const pwInput = document.getElementById('loginPw').value.trim();

      if (idInput === ADMIN_ID && pwInput === ADMIN_PW) {
        isAdminLoggedIn = true; // 자물쇠 열림
        document.getElementById('loginId').value = '';
        document.getElementById('loginPw').value = '';
        toggleLoginModal(false); // 모달 닫기
        updateAdminUI(); // 화면 새로 그리기 (입력창 및 반납버튼 활성화)
        alert('관리자로 로그인되었습니다. 분출 및 반납 기능이 활성화됩니다.');
      } else {
        alert('아이디 또는 비밀번호가 올바르지 않습니다.');
      }
    }

    /**
     * 관리자 로그아웃 로직 (자물쇠 다시 잠금)
     */
    function processLogout() {
      if(confirm('로그아웃 하시겠습니까? 조회 전용 모드로 돌아갑니다.')){
        isAdminLoggedIn = false;
        updateAdminUI();
      }
    }

    /**
     * [UI 통제 로직] 로그인 상태(isAdminLoggedIn)에 따라 화면의 입력창과 버튼을 숨기거나 보여주는 마법사입니다.
     */
    function updateAdminUI() {
      // 1. PC 화면 통제
      const pcFormAside = document.getElementById('pc-form-aside');
      const pcReadonlyNotice = document.getElementById('pc-readonly-notice');
      const pcAuthContainer = document.getElementById('pc-auth-container');
      
      if (isAdminLoggedIn) {
        pcFormAside.classList.remove('hidden'); // 좌측 입력폼 표시
        pcReadonlyNotice.classList.add('hidden'); // 조회 전용 안내문구 숨김
        pcAuthContainer.innerHTML = `<button onclick="processLogout()" class="bg-rose-600 hover:bg-rose-500 px-4 py-1.5 rounded-lg text-sm font-medium text-white shadow-sm">🔓 로그아웃</button>`;
      } else {
        pcFormAside.classList.add('hidden'); // 좌측 입력폼 숨김
        pcReadonlyNotice.classList.remove('hidden'); // 안내문구 표시
        pcAuthContainer.innerHTML = `<button onclick="toggleLoginModal(true)" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded-lg text-sm font-medium text-white shadow-sm">🔐 관리자 로그인</button>`;
      }

      // 2. 모바일 화면 통제
      const mobileFab = document.getElementById('mobile-fab');
      const mReadonlyNotice = document.getElementById('m-readonly-notice');
      const mAuthContainer = document.getElementById('m-auth-container');
      
      if (isAdminLoggedIn) {
        mobileFab.classList.remove('hidden'); // 우측 하단 동그란 등록 버튼 표시
        mobileFab.classList.add('flex');
        mReadonlyNotice.classList.add('hidden');
        mAuthContainer.innerHTML = `<button onclick="processLogout()" class="text-xs bg-rose-600 hover:bg-rose-500 px-2.5 py-1.5 rounded-md text-white font-medium shadow-sm">🔓 로그아웃</button>`;
      } else {
        mobileFab.classList.add('hidden'); // 등록 버튼 숨김
        mobileFab.classList.remove('flex');
        mReadonlyNotice.classList.remove('hidden');
        mReadonlyNotice.classList.add('flex');
        mAuthContainer.innerHTML = `<button onclick="toggleLoginModal(true)" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-2.5 py-1.5 rounded-md text-white font-medium shadow-sm">🔐 로그인</button>`;
      }

      // 3. 현재 화면에 그려져 있는 표(Table)나 카드(Card)의 '반납 버튼'을 로그인 상태에 맞춰 새로 그려줍니다.
      filterData(); 
    }

    // 로그인 모달창 껐다 켜기
    function toggleLoginModal(show) {
      const modal = document.getElementById('loginModal');
      if (show) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
      } else {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }
    }

    // PC 뷰와 모바일 뷰를 0초 만에 교체해주는 로직
    function switchViewMode(mode) {
      const pcView = document.getElementById('pc-view');
      const mobileView = document.getElementById('mobile-view');
      if (mode === 'pc') {
        pcView.classList.remove('hidden'); pcView.classList.add('flex');
        mobileView.classList.remove('flex'); mobileView.classList.add('hidden');
      } else {
        mobileView.classList.remove('hidden'); mobileView.classList.add('flex');
        pcView.classList.remove('flex'); pcView.classList.add('hidden');
      }
    }

    /**
     * [통신 로직 - 조회] CORS 에러 방지를 위해 GET 방식으로 데이터를 가져옵니다.
     */
    async function fetchData() {
      document.getElementById('pc-tableBody').innerHTML = '<tr><td colspan="8" class="text-center py-12 text-slate-500">🔄 데이터를 불러오는 중...</td></tr>';
      document.getElementById('m-cardContainer').innerHTML = '<div class="text-center py-12 text-slate-500">🔄 데이터를 불러오는 중...</div>';
      updatePcStatusBadge("통신 중...");

      try {
        const response = await fetch(SCRIPT_URL, { redirect: "follow" });
        if (!response.ok) throw new Error("서버 응답 오류");
        
        const result = await response.json();
        if (result.success) {
          globalRecords = result.data; 
          updatePcStatusBadge("동기화 완료");
          filterData(); 
        } else {
          throw new Error(result.message);
        }
      } catch (error) {
        document.getElementById('pc-tableBody').innerHTML = `<tr><td colspan="8" class="text-center py-12 text-red-500 font-medium">❌ 조회 실패: 구글 앱스 스크립트 URL 또는 배포 권한을 확인해주세요.</td></tr>`;
        document.getElementById('m-cardContainer').innerHTML = `<div class="text-center py-12 text-red-500 font-medium">❌ 조회 실패: 배포 권한 확인 요망</div>`;
        updatePcStatusBadge("통신 실패");
      }
    }

    /**
     * [통신 로직 - 쓰기/수정] CORS 에러의 주범인 Preflight 보안을 뚫기 위한 특수 통신 함수입니다.
     * headers에 Content-Type을 "text/plain"으로 강제 지정하여 구글 서버가 오해하지 않게 만듭니다.
     */
    async function sendDataToServer(payloadObj, btnElem, originalBtnText) {
      btnElem.disabled = true;
      btnElem.innerText = '서버 통신 중...';

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          redirect: "follow", // 구글 서버의 자동 리다이렉트를 따라갑니다.
          headers: {
            "Content-Type": "text/plain;charset=utf-8" // [핵심] JSON 포맷을 쓰지 않고 일반 텍스트로 위장하여 CORS 에러를 막습니다!
          },
          body: JSON.stringify(payloadObj)
        });
        
        const result = await response.json();
        btnElem.disabled = false; btnElem.innerText = originalBtnText;

        if (result.success) return true;
        else { alert('처리 실패: ' + result.message); return false; }
      } catch (error) {
        btnElem.disabled = false; btnElem.innerText = originalBtnText;
        alert('네트워크 오류 (CORS 또는 URL 확인): ' + error.message);
        return false;
      }
    }

    // 신규 등록 로직
    async function submitData(event, origin) {
      event.preventDefault();
      if (!isAdminLoggedIn) { alert("권한이 없습니다."); return; } // 이중 보안

      const prefix = origin === 'pc' ? 'pc-' : 'm-';
      const btn = document.getElementById(`${prefix}submitBtn`);
      
      const payloadData = {
        name: document.getElementById(`${prefix}name`).value.trim(),
        department: document.getElementById(`${prefix}department`).value.trim(),
        phone: document.getElementById(`${prefix}phone`).value.trim(),
        cardNumber: document.getElementById(`${prefix}cardNumber`).value
      };

      const requestObject = { action: "create", payload: payloadData };
      const isSuccess = await sendDataToServer(requestObject, btn, '분출 등록 완료');
      
      if (isSuccess) {
        document.getElementById(origin === 'pc' ? 'pcForm' : 'mobileForm').reset();
        if (origin === 'mobile') toggleMobileModal(false);
        fetchData();
      }
    }

    // 반납 처리 로직
    async function processReturn(rowNumber, btnElem) {
      if (!isAdminLoggedIn) { alert("관리자 로그인 후 이용 가능합니다."); return; }
      if (!confirm('카드가 정상 반납되었음을 확인하셨습니까?')) return;
      
      const requestObject = { action: "update", rowNumber: rowNumber };
      const isSuccess = await sendDataToServer(requestObject, btnElem, btnElem.innerText);
      if (isSuccess) fetchData();
    }

    // 데이터 필터링
    function filterData() {
      const pcSearch = document.getElementById('pc-search').value.toLowerCase();
      const pcStatus = document.getElementById('pc-statusFilter').value;
      const pcFiltered = globalRecords.filter(item => {
        const matchSearch = item.name.toLowerCase().includes(pcSearch) || item.department.toLowerCase().includes(pcSearch) || item.cardNumber.toLowerCase().includes(pcSearch);
        const matchStatus = (pcStatus === '전체') || (item.status === pcStatus);
        return matchSearch && matchStatus;
      });
      renderPcTable(pcFiltered);

      const mSearch = document.getElementById('m-search').value.toLowerCase();
      const mFiltered = globalRecords.filter(item => {
        const matchSearch = item.name.toLowerCase().includes(mSearch) || item.department.toLowerCase().includes(mSearch) || item.cardNumber.toLowerCase().includes(mSearch);
        const matchStatus = (currentMobileFilter === '전체') || (item.status === currentMobileFilter);
        return matchSearch && matchStatus;
      });
      renderMobileCards(mFiltered);
    }

    function setMobileFilter(status, elem) {
      currentMobileFilter = status;
      document.querySelectorAll('.m-filter-btn').forEach(btn => {
        btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
        btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
      });
      elem.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
      elem.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
      filterData();
    }

    function toggleMobileModal(show) {
      const modal = document.getElementById('m-registerModal');
      if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); } 
      else { modal.classList.remove('flex'); modal.classList.add('hidden'); }
    }

    function updatePcStatusBadge(text) { document.getElementById('pc-status-badge').innerText = text; }

    // PC 화면에 표를 그리는 공장
    function renderPcTable(records) {
      const tbody = document.getElementById('pc-tableBody');
      if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-12 text-slate-400">데이터가 존재하지 않습니다.</td></tr>'; return;
      }
      let html = '';
      records.forEach(item => {
        let badgeColor = 'bg-slate-100 text-slate-600 border-slate-200';
        if (item.status === '분출완료') badgeColor = 'bg-amber-100 text-amber-800 border-amber-200';
        else if (item.status === '반납완료') badgeColor = 'bg-emerald-100 text-emerald-800 border-emerald-200';

        // 보안 로직: 관리자가 로그인했을 때만 '반납 확인' 버튼을 화면에 그립니다!
        let actionColumnHtml = `<span class="text-xs text-slate-400">조회 전용</span>`;
        if (isAdminLoggedIn) {
          if (item.status === '분출완료') {
            actionColumnHtml = `<button onclick="processReturn(${item.rowNumber}, this)" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 text-xs font-medium px-3 py-1 rounded-md transition-colors whitespace-nowrap">반납 확인</button>`;
          } else {
            actionColumnHtml = `<span class="text-xs text-slate-400">처리완료</span>`;
          }
        }

        html += `
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 font-medium text-slate-900">${escapeHtml(item.name)}</td>
            <td class="px-6 py-4 text-slate-600">${escapeHtml(item.department)}</td>
            <td class="px-6 py-4 text-slate-600">${escapeHtml(item.phone)}</td>
            <td class="px-6 py-4 font-mono font-semibold text-indigo-700">${escapeHtml(item.cardNumber)}</td>
            <td class="px-6 py-4 text-xs text-slate-500">${item.disburseDate}</td>
            <td class="px-6 py-4 text-xs text-slate-500">${item.returnDate}</td>
            <td class="px-6 py-4 text-center"><span class="px-2.5 py-1 text-xs font-semibold rounded-full border ${badgeColor}">${item.status}</span></td>
            <td class="px-6 py-4 text-center">${actionColumnHtml}</td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    // 모바일 화면에 카드를 그리는 공장
    function renderMobileCards(records) {
      const container = document.getElementById('m-cardContainer');
      if (records.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm">데이터가 존재하지 않습니다.</div>'; return;
      }
      let html = '';
      records.forEach(item => {
        let badgeColor = 'bg-slate-100 text-slate-600';
        if (item.status === '분출완료') badgeColor = 'bg-amber-100 text-amber-800';
        else if (item.status === '반납완료') badgeColor = 'bg-emerald-100 text-emerald-800';
        
        // 보안 로직: 관리자일 때만 반납 버튼 생성
        let returnBtnHtml = '';
        if (isAdminLoggedIn && item.status === '분출완료') {
          returnBtnHtml = `<button onclick="processReturn(${item.rowNumber}, this)" class="w-full mt-2 bg-slate-50 hover:bg-indigo-50 text-indigo-600 border border-slate-200 font-medium py-2.5 rounded-lg text-sm shadow-sm transition-colors">반납 확인 처리</button>`;
        }
        
        html += `
          <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col space-y-2.5">
            <div class="flex justify-between items-center">
              <div class="flex items-center space-x-2">
                <span class="font-bold text-slate-900 text-base">${escapeHtml(item.name)}</span>
                <span class="text-xs text-slate-400">| ${escapeHtml(item.department)}</span>
              </div>
              <span class="px-2 py-0.5 text-xs font-semibold rounded-full ${badgeColor}">${item.status}</span>
            </div>
            
            <div class="text-xs space-y-1 text-slate-600">
              <div class="flex justify-between"><span>📞 전화번호:</span><a href="tel:${item.phone}" class="text-indigo-600 font-medium underline">${escapeHtml(item.phone)}</a></div>
              <div class="flex justify-between"><span>💳 카드번호:</span><span class="font-mono font-semibold text-indigo-700">${escapeHtml(item.cardNumber)}</span></div>
              <div class="flex justify-between text-slate-400"><span>🛫 분출일시:</span><span>${item.disburseDate}</span></div>
              <div class="flex justify-between text-slate-400"><span>🛬 반납일시:</span><span>${item.returnDate}</span></div>
            </div>
            ${returnBtnHtml}
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // XSS 공격 방어
    function escapeHtml(text) {
      if (!text) return '';
      return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
